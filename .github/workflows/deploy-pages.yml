name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static SPA)
        env:
          # Public Supabase keys — safe to expose. Set these as repository
          # variables (Settings → Secrets and variables → Actions → Variables)
          # OR hard-code them here since they are publishable keys.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Prepare static output
        run: |
          if [ -d "dist/client" ]; then
            OUT="dist/client"
          else
            OUT="dist"
          fi
          echo "Publishing $OUT"
          rm -f "$OUT/.assetsignore"
      
          # Find the built assets
          CSS=$(ls "$OUT/assets/"*.css | head -1 | xargs basename)
          # The larger JS file is the app entry (358 kB), smaller is the vendor chunk (274 kB)
          ENTRY_JS=$(ls -S "$OUT/assets/"index-*.js | head -1 | xargs basename)
          VENDOR_JS=$(ls -S "$OUT/assets/"index-*.js | tail -1 | xargs basename)
      
          # Generate index.html
          cat > "$OUT/index.html" << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Label Spark Insight</title>
              <script>window.__BASE__="/label-spark-insight/"</script>
              <link rel="stylesheet" crossorigin href="/label-spark-insight/assets/${CSS}">
            </head>
            <body>
              <div id="root"></div>
              <script type="module" crossorigin src="/label-spark-insight/assets/${VENDOR_JS}"></script>
              <script type="module" crossorigin src="/label-spark-insight/assets/${ENTRY_JS}"></script>
            </body>
          </html>
          HTMLEOF
      
          cp "$OUT/index.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"
          echo "OUT_DIR=$OUT" >> $GITHUB_ENV

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
