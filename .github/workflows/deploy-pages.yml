name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (static SPA)
        env:
          # Public Supabase keys — safe to expose. Set these as repository
          # variables (Settings → Secrets and variables → Actions → Variables)
          # OR hard-code them here since they are publishable keys.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Prepare static output
        run: |
          # TanStack Start outputs the client bundle to dist/client.
          # Fall back to dist if the client folder isn't present.
          if [ -d "dist/client" ]; then
            OUT="dist/client"
          else
            OUT="dist"
          fi
          echo "Publishing $OUT"
          # Remove Cloudflare-specific file that would suppress index.html
          rm -f "$OUT/.assetsignore"
          # SPA fallback so deep links work on GitHub Pages
          cp "$OUT/index.html" "$OUT/404.html" 2>/dev/null || true
          # Disable Jekyll
          touch "$OUT/.nojekyll"
          echo "OUT_DIR=$OUT" >> $GITHUB_ENV

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
